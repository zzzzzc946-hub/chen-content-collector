<!doctype html>
<html lang="zh-CN">
  <body style="font-family: Arial, sans-serif; color: #17202a; line-height: 1.6;">
    <h2>MAX 外部情报口喷日报</h2>
    <p>你的登录验证码是：</p>
    <p style="font-size: 28px; font-weight: 700; letter-spacing: 4px;">
      {{ .Token }}
    </p>
    <p>你也可以点击下面的按钮直接登录：</p>
    <p>
      <a href="{{ .ConfirmationURL }}"
         style="display: inline-block; padding: 10px 18px; color: #ffffff; background: #137c8b; text-decoration: none;">
        进入 MAX 日报
      </a>
    </p>
    <p style="color: #667085;">验证码和链接均为一次性，请勿转发。</p>
  </body>
</html>
