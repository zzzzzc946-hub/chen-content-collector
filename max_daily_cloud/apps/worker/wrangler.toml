name = "max-daily-cloud-worker"
main = "src/index.ts"
compatibility_date = "2026-07-10"
# The confirmed production endpoint remains the generated workers.dev URL.
# Media is configured at runtime through SUPABASE_STORAGE_BUCKET only.
workers_dev = true

[triggers]
crons = ["0 * * * *"]

[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/c/*"]

[[ratelimits]]
name = "INVITATION_CLAIM_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 10
period = 60

[[ratelimits]]
name = "PUBLIC_SHARE_RATE_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 30
period = 60

[[ratelimits]]
name = "MOBILE_INBOX_RATE_LIMITER"
namespace_id = "1003"

[ratelimits.simple]
limit = 10
period = 60

[secrets]
required = [
  "APP_ORIGIN",
  "FEISHU_APP_ID",
  "FEISHU_APP_SECRET",
  "FEISHU_APP_TOKEN",
  "FEISHU_MOBILE_INBOX_TABLE_ID",
  "MEDIA_SESSION_SECRET",
  "OWNER_EMAIL",
  "PUBLISHER_TOKEN_PEPPER",
  "SHARE_COOKIE_SECRET",
  "SUPABASE_ANON_KEY",
  "SUPABASE_SERVICE_ROLE_KEY",
  "SUPABASE_STORAGE_BUCKET",
  "SUPABASE_URL",
]

[observability.logs]
enabled = false
