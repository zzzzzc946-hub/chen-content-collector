name: MAX Daily Cloud

on:
  pull_request:
    paths:
      - ".github/workflows/max-daily-cloud.yml"
      - "max_daily_cloud/**"
      - "test_webhook_helpers.py"
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/max-daily-cloud.yml"
      - "max_daily_cloud/**"
      - "test_webhook_helpers.py"
  workflow_dispatch:

env:
  WORKER_ORIGIN: "https://max-daily-cloud-worker.1643434181.workers.dev"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "max_daily_cloud/package-lock.json"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reject tracked secrets
        run: |
          if git grep -nE '(SUPABASE_SERVICE_ROLE_KEY|PUBLISHER_DEVICE_TOKEN)=' -- ':!*.example'; then
            echo 'Tracked secret detected'
            exit 1
          fi

      - name: Install cloud dependencies
        working-directory: max_daily_cloud
        run: npm ci

      - name: Run cloud unit tests
        working-directory: max_daily_cloud
        run: npm test

      - name: Typecheck
        working-directory: max_daily_cloud
        run: npm run typecheck

      - name: Build web app
        working-directory: max_daily_cloud
        run: npm --workspace apps/web run build

      - name: Test local publisher
        working-directory: max_daily_cloud
        run: python3 -m unittest publisher/test_max_daily_publisher.py

      - name: Verify Worker bundle
        working-directory: max_daily_cloud/apps/worker
        run: npx wrangler deploy --dry-run --outdir /tmp/max-daily-worker-final

      - name: Audit high-severity production dependencies
        working-directory: max_daily_cloud
        run: npm audit --audit-level=high

      - name: Frozen collector smoke tests
        run: PYTHONPYCACHEPREFIX=/tmp/max-daily-pycache python3 -m unittest test_webhook_helpers.py

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: max-daily-cloud-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Confirm deployment still targets current master
        run: |
          git fetch origin master --depth=1
          if [ "$GITHUB_SHA" != "$(git rev-parse origin/master)" ]; then
            echo "A newer master commit exists; refusing to deploy stale code."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "max_daily_cloud/package-lock.json"

      - name: Install cloud dependencies
        working-directory: max_daily_cloud
        run: npm ci

      - name: Link Supabase production project
        working-directory: max_daily_cloud
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply Supabase migrations through 017
        working-directory: max_daily_cloud
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Build web app
        working-directory: max_daily_cloud
        env:
          VITE_API_BASE_URL: ${{ env.WORKER_ORIGIN }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: npm --workspace apps/web run build

      - name: Pin Worker application origin
        working-directory: max_daily_cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: printf '%s' "$WORKER_ORIGIN" | npx wrangler secret put APP_ORIGIN --config apps/worker/wrangler.toml

      - name: Deploy same-origin Worker and web assets
        working-directory: max_daily_cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config apps/worker/wrangler.toml
